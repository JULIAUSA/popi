<!DOCTYPE html>
<html>
<head>
<title>Для тебя ❤️</title>
<style>
body{
    background:#ffe6f0;
    text-align:center;
    font-family:Arial;
    margin-top:100px;
    overflow: hidden;
}

/* Котик */
#cat{
    position:absolute;
    width:80px;
    transition:0.1s linear;
    pointer-events: none;
}

/* Кнопки */
button{
    padding:15px 30px;
    font-size:20px;
    background:#ff4d88;
    color:white;
    border:none;
    border-radius:10px;
    margin: 10px;
    position: relative;
    cursor: pointer;
}

/* Анимации */
@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity:1; }
    100% { transform: translateY(-100px) scale(1.5); opacity:0; }
}

.hidden{
    display:none;
}

/* Маленькие сердечки и какашки */
.heart, .poop {
    position: absolute;
    font-size: 25px;
    pointer-events:none;
    animation: floatUp 1s forwards;
}

/* Большие сердце и попа */
#bigHeart, #bigPoop {
    position: fixed;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    font-size:200px;
    display:none;
    z-index: 1000;
}
#loveText {
    position: fixed;
    top:60%;
    left:50%;
    transform: translate(-50%, -50%);
    font-size:50px;
    color:red;
    display:none;
    z-index:1001;
}
</style>
</head>
<body>

<h1>Вопрос для тебя ❤️</h1>
<p>Любишь меня?</p>

<button id="yesBtn">Да</button>
<button id="noBtn">Нет</button>

<!-- Котик -->
<img src="https://cdn.creazilla.com/fragments/10000116637/alert-cat-lg.png" id="cat" alt="котик">

<!-- Большие эффекты -->
<div id="bigHeart">❤️</div>
<div id="bigPoop">💩</div>
<div id="loveText">Я тебя люблю ❤️</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const cat = document.getElementById('cat');

    // Котик бегает за курсором
    document.addEventListener('mousemove', e => {
        const offsetX = 30;
        const offsetY = 40;
        const x = e.clientX + offsetX - cat.width/2;
        const y = e.clientY + offsetY - cat.height/2;
        cat.style.left = x + 'px';
        cat.style.top = y + 'px';
    });

    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');

    // Наведение на "Да" → маленькие сердечки
    yesBtn.addEventListener('mouseenter', e => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = '❤️';
        heart.style.left = (e.clientX + Math.random()*30 -15)+'px';
        heart.style.top = (e.clientY + Math.random()*30 -15)+'px';
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),1000);
    });

    // Наведение на "Нет" → маленькие 💩
    noBtn.addEventListener('mouseenter', e => {
        const poop = document.createElement('div');
        poop.className = 'poop';
        poop.textContent = '💩';
        poop.style.left = (e.clientX + Math.random()*30 -15)+'px';
        poop.style.top = (e.clientY + Math.random()*30 -15)+'px';
        document.body.appendChild(poop);
        setTimeout(()=>poop.remove(),1000);
    });

    // Клик на "Да" → большое сердце и текст
    yesBtn.addEventListener('click', () => {
        document.getElementById('bigHeart').style.display='block';
        document.getElementById('loveText').style.display='block';
        setTimeout(()=>{
            document.getElementById('bigHeart').style.display='none';
            document.getElementById('loveText').style.display='none';
        },2000);
    });

    // Клик на "Нет" → огромная 💩
    noBtn.addEventListener('click', () => {
        const bigPoop = document.getElementById('bigPoop');
        bigPoop.style.display='block';
        setTimeout(()=>{
            bigPoop.style.display='none';
        },2000);
    });
});
</script>

</body>
</html>
