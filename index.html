<!DOCTYPE html>
<html>
<head>
<title>Для тебя ❤️</title>
<style>
body{
    background:#ffe6f0;
    text-align:center;
    font-family:Arial;
    margin-top:100px;
}

button{
    padding:15px 30px;
    font-size:20px;
    background:#ff4d88;
    color:white;
    border:none;
    border-radius:10px;
}

.hidden{
    display:none;
    font-size:30px;
    margin-top:30px;
}
</style>
</head>

<body>

<h1>Нажми кнопку</h1>

<button onclick="showLove()">Нажать</button>

<div id="love" class="hidden">
Я тебя люблю ❤️
</div>

<script>
function showLove(){
document.getElementById("love").style.display="block";
}
</script>

</body>
</html>
